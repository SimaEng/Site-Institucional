<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Video Inspect</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #10151d;
      color: #fff;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    .frame {
      background: #1b2430;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 10px;
    }
    .frame strong {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #cbd5e1;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Frames do videoplayback.mp4</h1>
  <div class="grid" id="grid"></div>
  <video id="video" muted playsinline preload="auto" src="./videoplayback.mp4" style="display:none"></video>
  <script>
    const times = [0, 0.16, 0.32, 0.48, 0.64, 0.8, 1.0, 1.2, 1.5];
    const video = document.getElementById("video");
    const grid = document.getElementById("grid");

    const seekTo = (time) => new Promise((resolve) => {
      const done = () => {
        video.removeEventListener("seeked", done);
        resolve();
      };
      video.addEventListener("seeked", done, { once: true });
      video.currentTime = Math.min(time, Math.max(0, video.duration - 0.05));
    });

    const boot = async () => {
      await new Promise((resolve) => {
        if (video.readyState >= 1) resolve();
        else video.addEventListener("loadedmetadata", resolve, { once: true });
      });

      for (const time of times) {
        await seekTo(time);
        const wrap = document.createElement("div");
        wrap.className = "frame";
        const label = document.createElement("strong");
        label.textContent = `${time.toFixed(2)}s`;
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
        wrap.append(label, canvas);
        grid.append(wrap);
      }
      document.body.dataset.ready = "true";
    };

    boot();
  </script>
</body>
</html>
